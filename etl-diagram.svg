<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="100%"
     font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
     role="img" aria-label="ETL pipeline: Sources to Ingest to Raw to Transform to Warehouse, branching into Analytics and ML, orchestrated by Airflow / Cloud Composer">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#1f2328" flood-opacity="0.16"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#24292f"/>
    </marker>
    <marker id="arr-orch" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#9a7d0a"/>
    </marker>
  </defs>

  <!-- ============ MAIN PIPELINE (top row, y≈180) ============ -->

  <!-- Sources (cylinder, yellow) -->
  <g filter="url(#shadow)">
    <path d="M 60,135 Q 60,118 130,118 Q 200,118 200,135 L 200,235 Q 200,252 130,252 Q 60,252 60,235 Z"
          fill="#fef3c7" stroke="#24292f" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M 60,135 Q 60,152 130,152 Q 200,152 200,135"
          fill="none" stroke="#24292f" stroke-width="2.5"/>
  </g>
  <text x="130" y="190" text-anchor="middle" font-size="24" font-weight="700" fill="#24292f">Sources</text>
  <text x="130" y="220" text-anchor="middle" font-size="15" fill="#57606a">APIs · DBs · Events</text>

  <path d="M 205,185 Q 232,183 257,185" fill="none" stroke="#24292f" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Ingest (rect, green) -->
  <g filter="url(#shadow)">
    <rect x="262" y="120" width="160" height="130" rx="14"
          fill="#d1fae5" stroke="#24292f" stroke-width="2.5"/>
  </g>
  <text x="342" y="165" text-anchor="middle" font-size="24" font-weight="700" fill="#24292f">Ingest</text>
  <text x="342" y="195" text-anchor="middle" font-size="15" fill="#57606a">Go · Python</text>
  <text x="342" y="218" text-anchor="middle" font-size="15" fill="#57606a">500k+ records / day</text>

  <path d="M 427,185 Q 454,183 479,185" fill="none" stroke="#24292f" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Raw (cylinder, blue) -->
  <g filter="url(#shadow)">
    <path d="M 484,135 Q 484,118 559,118 Q 634,118 634,135 L 634,235 Q 634,252 559,252 Q 484,252 484,235 Z"
          fill="#dbeafe" stroke="#24292f" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M 484,135 Q 484,152 559,152 Q 634,152 634,135"
          fill="none" stroke="#24292f" stroke-width="2.5"/>
  </g>
  <text x="559" y="185" text-anchor="middle" font-size="24" font-weight="700" fill="#24292f">Raw</text>
  <text x="559" y="215" text-anchor="middle" font-size="15" fill="#57606a">Databricks</text>
  <text x="559" y="235" text-anchor="middle" font-size="15" fill="#57606a">BigQuery</text>

  <path d="M 639,185 Q 666,183 691,185" fill="none" stroke="#24292f" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Transform (rect, green) -->
  <g filter="url(#shadow)">
    <rect x="696" y="120" width="160" height="130" rx="14"
          fill="#d1fae5" stroke="#24292f" stroke-width="2.5"/>
  </g>
  <text x="776" y="170" text-anchor="middle" font-size="24" font-weight="700" fill="#24292f">Transform</text>
  <text x="776" y="200" text-anchor="middle" font-size="15" fill="#57606a">dbt</text>
  <text x="776" y="223" text-anchor="middle" font-size="15" fill="#57606a">PySpark</text>

  <path d="M 861,185 Q 888,183 913,185" fill="none" stroke="#24292f" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Warehouse (cylinder, orange) -->
  <g filter="url(#shadow)">
    <path d="M 918,135 Q 918,118 1005,118 Q 1092,118 1092,135 L 1092,235 Q 1092,252 1005,252 Q 918,252 918,235 Z"
          fill="#fed7aa" stroke="#24292f" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M 918,135 Q 918,152 1005,152 Q 1092,152 1092,135"
          fill="none" stroke="#24292f" stroke-width="2.5"/>
  </g>
  <text x="1005" y="195" text-anchor="middle" font-size="24" font-weight="700" fill="#24292f">Warehouse</text>
  <text x="1005" y="225" text-anchor="middle" font-size="15" fill="#57606a">BigQuery · Databricks</text>

  <!-- ============ BRANCH from Warehouse → Analytics + ML ============ -->

  <!-- Vertical down from Warehouse, then horizontal split, then down to Analytics + ML -->
  <path d="M 1005,255 L 1005,310" fill="none" stroke="#24292f" stroke-width="2.5"/>
  <path d="M 1005,310 L 770,310" fill="none" stroke="#24292f" stroke-width="2.5"/>
  <path d="M 1005,310 L 1110,310" fill="none" stroke="#24292f" stroke-width="2.5"/>
  <path d="M 770,310 L 770,375" fill="none" stroke="#24292f" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M 1110,310 L 1110,375" fill="none" stroke="#24292f" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Analytics (rect, pink) -->
  <g filter="url(#shadow)">
    <rect x="690" y="380" width="160" height="130" rx="14"
          fill="#fce7f3" stroke="#24292f" stroke-width="2.5"/>
  </g>
  <text x="770" y="425" text-anchor="middle" font-size="24" font-weight="700" fill="#24292f">Analytics</text>
  <text x="770" y="455" text-anchor="middle" font-size="15" fill="#57606a">Superset</text>
  <text x="770" y="478" text-anchor="middle" font-size="15" fill="#57606a">dashboards</text>

  <!-- ML (rect, purple) -->
  <g filter="url(#shadow)">
    <rect x="1030" y="380" width="160" height="130" rx="14"
          fill="#e9d5ff" stroke="#24292f" stroke-width="2.5"/>
  </g>
  <text x="1110" y="425" text-anchor="middle" font-size="24" font-weight="700" fill="#24292f">ML</text>
  <text x="1110" y="455" text-anchor="middle" font-size="15" fill="#57606a">datatrax (Go)</text>
  <text x="1110" y="478" text-anchor="middle" font-size="15" fill="#57606a">7 algorithms</text>

  <!-- ============ ORCHESTRATOR (Airflow, dashed yellow) ============ -->

  <g filter="url(#shadow)">
    <rect x="200" y="420" width="320" height="90" rx="14"
          fill="#fef9c3" stroke="#9a7d0a" stroke-width="2.5" stroke-dasharray="7 4"/>
  </g>
  <text x="360" y="458" text-anchor="middle" font-size="20" font-weight="700" fill="#3d444d">Airflow · Cloud Composer</text>
  <text x="360" y="485" text-anchor="middle" font-size="14" font-style="italic" fill="#57606a">orchestrates</text>

  <!-- Dashed arrows from Airflow up to Ingest and Transform -->
  <path d="M 290,420 Q 290,335 342,260" fill="none" stroke="#9a7d0a" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arr-orch)"/>
  <path d="M 430,420 Q 600,340 776,260" fill="none" stroke="#9a7d0a" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arr-orch)"/>
</svg>
